alias: "Roxana pleacă din Govora"
description: >-
  Trimite notificare pe Samsung S24 Ultra când Roxana părăsește
  zona Govora.
mode: single

trigger:
  - platform: zone
    entity_id: person.roxana
    zone: zone.govora
    event: leave

action:
  - service: notify.mobile_app_samsung_galaxy_s24_ultra
    data:
      title: "Roxana a plecat din Govora"
      message: "Roxana a părăsit zona Govora la {{ now().strftime('%H:%M') }}."
      data:
        channel: location_alerts
        importance: high
        ttl: 0
        priority: high
