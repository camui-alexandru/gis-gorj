<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Descarcă PUG complet — gis.cjgorj.ro</title>
<script src="https://unpkg.com/flatgeobuf@3.30.0/dist/flatgeobuf-geojson.min.js"></script>
<style>
  body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
  h2 { color: #7ec8e3; }
  p  { color: #aaa; font-size: 14px; line-height: 1.6; }
  button { padding: 12px 28px; background: #8e44ad; color: #fff; border: none; border-radius: 6px;
           cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 8px; }
  button:disabled { background: #555; cursor: not-allowed; }
  #status { margin-top: 20px; padding: 14px; border-radius: 6px; background: #0f3460;
            font-size: 13px; min-height: 60px; white-space: pre-wrap; line-height: 1.8; }
  #status.ok  { border-left: 4px solid #2ecc71; }
  #status.err { border-left: 4px solid #e74c3c; }
  #status.run { border-left: 4px solid #f39c12; }
  progress { width: 100%; height: 12px; margin-top: 12px; border-radius: 4px; display:none; }
</style>
</head>
<body>
<h2>Descarcă PUG.fgb complet</h2>
<p>
  Obține mai întâi lista completă de ID-uri de la ArcGIS, apoi descarcă features în loturi.
  Această metodă garantează că niciun feature nu este omis, indiferent de limita serverului.
</p>
<p>Selectează stratul de descărcat:</p>
<select id="layerSel" style="padding:8px;background:#0f3460;color:#eee;border:1px solid #7ec8e3;border-radius:6px;font-size:14px;width:100%">
  <option value="0">Layer 0 — PUG (zone urbanism)</option>
  <option value="1">Layer 1 — Zone Protecție</option>
  <option value="2">Layer 2 — PUZ</option>
</select>
<br>
<button id="btn" onclick="startDownload()">▶ Descarcă complet</button>
<progress id="prog" value="0" max="100"></progress>
<div id="status">Apasă butonul pentru a începe.</div>

<script>
const SERVER = 'https://gis.cjgorj.ro/server/rest/services/FIDA/PUG/MapServer';
const PROXY  = 'https://gis.cjgorj.ro/proxy/proxy.ashx?';
const BATCH  = 500; // features per request (conservativ)

let useProxy = false;

function url(layerId, params) {
  const base = `${SERVER}/${layerId}/query?${new URLSearchParams(params)}`;
  return useProxy ? PROXY + encodeURIComponent(base) : base;
}

async function apiFetch(layerId, params) {
  const resp = await fetch(url(layerId, params));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  if (data.error) throw new Error(`ArcGIS error ${data.error.code}: ${data.error.message}`);
  return data;
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

async function startDownload() {
  const btn = document.getElementById('btn');
  const prog = document.getElementById('prog');
  const layerId = document.getElementById('layerSel').value;
  btn.disabled = true;
  prog.style.display = 'block';
  prog.value = 0;

  // 1. Test CORS
  setStatus('Testez conexiunea...', 'run');
  try {
    await apiFetch(layerId, { where:'1=1', returnCountOnly:'true', f:'json' });
    useProxy = false;
  } catch(e) {
    setStatus('CORS blocat, încerc prin proxy...', 'run');
    useProxy = true;
    try {
      await apiFetch(layerId, { where:'1=1', returnCountOnly:'true', f:'json' });
    } catch(e2) {
      setStatus('Eroare conexiune:\n' + e2.message, 'err');
      btn.disabled = false; return;
    }
  }

  // 2. Obține totalul de features
  let totalCount;
  try {
    const countResp = await apiFetch(layerId, { where:'1=1', returnCountOnly:'true', f:'json' });
    totalCount = countResp.count;
    setStatus(`Total features în serviciu: ${totalCount}\nObttin lista de ID-uri...`, 'run');
  } catch(e) {
    setStatus('Eroare la obținerea numărului de features:\n' + e.message, 'err');
    btn.disabled = false; return;
  }

  // 3. Obține TOATE objectId-urile
  let allIds;
  try {
    const idsResp = await apiFetch(layerId, { where:'1=1', returnIdsOnly:'true', f:'json' });
    allIds = idsResp.objectIds || [];
    allIds.sort((a, b) => a - b);
    setStatus(`Total ID-uri obținute: ${allIds.length} / ${totalCount}\nÎncep descărcarea features...`, 'run');
  } catch(e) {
    setStatus('Eroare la obținerea ID-urilor:\n' + e.message, 'err');
    btn.disabled = false; return;
  }

  if (allIds.length === 0) {
    setStatus('Niciun ID returnat de server.', 'err');
    btn.disabled = false; return;
  }

  // 4. Descarcă features în loturi după objectId
  const allFeatures = [];
  const oidField = 'OBJECTID'; // ArcGIS standard
  const totalBatches = Math.ceil(allIds.length / BATCH);

  for (let i = 0; i < allIds.length; i += BATCH) {
    const batchIds = allIds.slice(i, i + BATCH);
    const batchNum = Math.floor(i / BATCH) + 1;
    const pct = Math.round((i / allIds.length) * 95);
    prog.value = pct;
    setStatus(
      `Lot ${batchNum}/${totalBatches} (ID ${batchIds[0]}–${batchIds[batchIds.length-1]})\n` +
      `Features colectate: ${allFeatures.length} / ${allIds.length}`,
      'run'
    );

    try {
      const data = await apiFetch(layerId, {
        objectIds: batchIds.join(','),
        outFields: '*',
        returnGeometry: 'true',
        geometryPrecision: '6',
        f: 'geojson',
      });
      for (const f of (data.features || [])) {
        if (f.geometry?.type && f.geometry?.coordinates?.length) {
          allFeatures.push(f);
        }
      }
    } catch(e) {
      setStatus(`Eroare la lotul ${batchNum}:\n` + e.message, 'err');
      btn.disabled = false; return;
    }

    // pauza scurtă pentru a nu supraîncărca serverul
    await new Promise(r => setTimeout(r, 150));
  }

  // 5. Conversie FGB
  prog.value = 97;
  setStatus(`Convertesc ${allFeatures.length} features în FlatGeobuf...`, 'run');
  await new Promise(r => setTimeout(r, 50));

  let fgb;
  try {
    fgb = flatgeobuf.serialize({ type: 'FeatureCollection', features: allFeatures });
  } catch(e) {
    setStatus('Eroare la serializare FGB:\n' + e.message, 'err');
    btn.disabled = false; return;
  }

  prog.value = 100;
  const sizeMB = (fgb.byteLength / 1024 / 1024).toFixed(1);

  const layerNames = { '0':'PUG', '1':'ZoneProtectie', '2':'PUZ' };
  const outName = (layerNames[layerId] || `layer${layerId}`) + '.fgb';

  const blob = new Blob([fgb]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = outName;
  a.click();

  setStatus(
    `✓ Descărcat: ${outName}\n` +
    `ID-uri în serviciu: ${allIds.length}\n` +
    `Features cu geometrie validă: ${allFeatures.length}\n` +
    `Dimensiune: ${sizeMB} MB\n\n` +
    `Înlocuiește DATA/${outName} din repository cu acest fișier.`,
    'ok'
  );
  btn.disabled = false;
}
</script>
</body>
</html>
